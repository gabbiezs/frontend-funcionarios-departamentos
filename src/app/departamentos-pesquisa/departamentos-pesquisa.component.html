<div class="card">

  <h2>Pesquisa de Departamentos</h2>

  <div class="p-inputgroup mb-3">
    <input type="text" pInputText placeholder="Pesquisar departamento">
    <button pButton type="button" label="Pesquisar"></button>
  </div>

  <p-table
    [value]="departamentos"
    [paginator]="true"
    [rows]="5">

    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nome do Departamento</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-departamento>
      <tr>
        <td>{{ departamento.id }}</td>
        <td>{{ departamento.nomeDepartamento }}</td>
        <td>
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-rounded p-button-text p-button-warning"
            pTooltip="Editar">
          </button>

          <button
            pButton
            icon="pi pi-trash"
            class="p-button-rounded p-button-text p-button-danger"
            pTooltip="Excluir">
          </button>
        </td>
      </tr>
    </ng-template>

  </p-table>

  <br>

  <button
    pButton
    label="Novo Departamento"
    icon="pi pi-plus"
    class="p-button-success">
  </button>

</div>
